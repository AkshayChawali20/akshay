<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <div class="row justify-content-center">
      <div class="col-md-6">
        <h1 class="text-center mb-4">Todo App</h1>

        <form id="addForm">
          <div class="input-group mb-3">
            <input type="text" id="todoInput" class="form-control" placeholder="Add a new todo" required>
            <button class="btn btn-primary" type="submit">Add</button>
          </div>
        </form>

        <ul id="todoList" class="list-group"></ul>
      </div>
    </div>
  </div>

  <script>
    async function fetchTodos() {
      const res = await fetch('/read');
      const data = await res.json();
      return data.result;
    }

    async function addTodo(title) {
      await fetch('/create', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, completed: false })
      });
    }

    async function deleteTodo(id) {
      await fetch(`/remove/${id}`, { method: 'DELETE' });
    }

    async function updateTodo(id, body) {
      await fetch(`/modify/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
    }

    async function loadTodos() {
      const todos = await fetchTodos();
      const list = document.getElementById('todoList');
      list.innerHTML = '';
      todos.forEach((todo, index) => {
        const id = index + 1;
        const li = document.createElement('li');
        li.className = 'list-group-item d-flex justify-content-between align-items-center';
        li.innerHTML = `
          <span class="todo-text ${todo.completed ? 'text-decoration-line-through' : ''}">${todo.title}</span>
          <div class="btn-group btn-group-sm">
            <button class="btn btn-outline-success toggle-btn" data-id="${id}">${todo.completed ? '↩' : '✓'}</button>
            <button class="btn btn-outline-danger delete-btn" data-id="${id}">✗</button>
          </div>
        `;
        list.appendChild(li);
      });
    }

    document.getElementById('addForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;
      await addTodo(title);
      input.value = '';
      await loadTodos();
    });

    document.getElementById('todoList').addEventListener('click', async (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const id = parseInt(btn.dataset.id);
      if (btn.classList.contains('delete-btn')) {
        await deleteTodo(id);
        await loadTodos();
      } else if (btn.classList.contains('toggle-btn')) {
        const todos = await fetchTodos();
        const todo = todos[id - 1];
        await updateTodo(id, { ...todo, completed: !todo.completed });
        await loadTodos();
      }
    });

    loadTodos();
  </script>
</body>
</html>
